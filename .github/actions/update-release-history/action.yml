name: Update release history
description: >-
  Append a release entry to RELEASES.md in the release-machine repo and push the
  commit. Assumes release-machine is checked out at the workspace root.

inputs:
  target-path:
    description: Path where the target repo is checked out (used to look up the tagger email)
    required: true
  package-name:
    description: Name of the package being released
    required: true
  tag:
    description: Release tag (e.g., v1.0.0)
    required: true
  github-token:
    description: Token used by add-release.sh to resolve the tagger's GitHub username
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        TARGET_PATH: ${{ inputs.target-path }}
        PACKAGE_NAME: ${{ inputs.package-name }}
        TAG: ${{ inputs.tag }}
      run: |
        # Extract tagger email from the release tag
        pushd "$TARGET_PATH" > /dev/null
        TAGGER_EMAIL=$(git for-each-ref --format='%(taggeremail)' "refs/tags/$TAG" | tr -d '<>')
        if [ -z "$TAGGER_EMAIL" ]; then
          TAGGER_EMAIL=$(git log -1 --pretty=format:'%ae' "$TAG")
        fi
        popd > /dev/null

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Concurrent releases push to main at the same time, so a plain push can be rejected when
        # another run lands first. Re-apply the entry on top of the latest main and retry.
        #
        # Re-applying (rather than rebasing) avoids a merge conflict, since every entry is meant to
        # go to the top of the same list.
        MAX_ATTEMPTS=20
        attempt=1
        while true; do
          git fetch origin main
          git reset --hard origin/main

          ./.github/scripts/add-release.sh "$PACKAGE_NAME" "$TAG" "$TAGGER_EMAIL"
          git add RELEASES.md
          git commit -m "Add release: $PACKAGE_NAME $TAG"

          if git push origin HEAD:main; then
            echo "Pushed release entry on attempt $attempt"
            break
          fi

          if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
            echo "ERROR: Failed to push release entry after $MAX_ATTEMPTS attempts"
            exit 1
          fi

          # Linear backoff with jitter to avoid a thundering herd of retries.
          JITTER=$((RANDOM % 3))
          SLEEP_TIME=$((attempt + JITTER))
          echo "Push rejected (attempt $attempt/$MAX_ATTEMPTS); another release pushed concurrently. Retrying in ${SLEEP_TIME}s..."
          sleep $SLEEP_TIME
          attempt=$((attempt + 1))
        done
