name: Announce release
run-name: Announce ${{ github.event.inputs.repo }} ${{ github.event.inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository that was released (e.g., owner/repo)"
        required: true
        type: string
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string
      package_name:
        description: "Package name"
        required: true
        type: string
      label:
        description: 'Optional label to include after the post title (e.g. "npm")'
        required: false
        type: string
        default: ""

jobs:
  forum:
    runs-on: ubuntu-latest
    outputs:
      forum_url: ${{ steps.post.outputs.url }}
    env:
      FORUM_URL: "https://discourse.hanakai.org"
      FORUM_CATEGORY_ID: "17"
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4

      - name: Post to forum
        id: post
        env:
          FORUM_API_KEY: ${{ secrets.FORUM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Set pipefail so a non-zero exit from the script fails the step. Use tee so the script's
          # output (including error details) is visible in the log.
          set -o pipefail
          ruby .github/scripts/announce-to-forum.rb \
            "${{ github.event.inputs.package_name }}" \
            "${{ github.event.inputs.repo }}" \
            "${{ github.event.inputs.tag }}" \
            "${{ github.event.inputs.label }}" | tee output.txt

          POST_URL=$(grep -oE 'https://discourse[^ ]+' output.txt || true)
          echo "url=$POST_URL" >> "$GITHUB_OUTPUT"

  announcements:
    needs: forum
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Prepare summary
        run: |
          echo "### ${{ github.event.inputs.package_name }} ${{ github.event.inputs.tag }} announcements" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.forum.result }}" == "success" ]; then
            echo "- [Forum post](${{ needs.forum.outputs.forum_url }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Forum post failed" >> $GITHUB_STEP_SUMMARY
          fi
