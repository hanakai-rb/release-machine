name: Release gem
run-name: Release ${{ github.event.inputs.repo }} ${{ github.event.inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository to release (e.g., owner/repo)"
        required: true
        type: string
      tag:
        description: "Tag to release (e.g., v1.0.0)"
        required: true
        type: string
      announce:
        description: "Trigger release announcements"
        required: false
        type: boolean
        default: true

jobs:
  release:
    permissions:
      id-token: write # For OIDC authentication with RubyGems
      contents: write
      actions: write # For triggering announce workflow

    runs-on: ubuntu-latest
    steps:
      - name: Checkout release-machine
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Checkout repo to release
        uses: actions/checkout@v6
        with:
          repository: ${{github.event.inputs.repo}}
          ref: refs/tags/${{github.event.inputs.tag}}
          path: release-gem

      - name: Extract gem name
        id: gem_name
        run: |
          GEMSPEC=$(find release-gem -maxdepth 1 -name "*.gemspec" -type f | head -1)

          if [ -z "$GEMSPEC" ]; then
            echo "ERROR: No .gemspec file found in repository"
            exit 1
          fi

          # Extract gem name from gemspec filename ("hanami-router.gemspec" -> "hanami-router")
          GEM_NAME=$(basename "$GEMSPEC" .gemspec)

          if [ -z "$GEM_NAME" ]; then
            echo "ERROR: Could not extract gem name from $GEMSPEC"
            exit 1
          fi

          echo "gem_name=$GEM_NAME" >> $GITHUB_OUTPUT

      - name: Authorize release
        uses: ./.github/actions/authorize-release
        with:
          package-name: ${{ steps.gem_name.outputs.gem_name }}
          target-path: release-gem
          tag: ${{ github.event.inputs.tag }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4

      - uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Build gem
        working-directory: release-gem
        env:
          GEM_NAME: ${{ steps.gem_name.outputs.gem_name }}
        run: gem build "${GEM_NAME}.gemspec"

      - name: Publish gem to RubyGems.org
        working-directory: release-gem
        env:
          GEM_NAME: ${{ steps.gem_name.outputs.gem_name }}
        run: gem push "${GEM_NAME}"-*.gem

      - name: Publish gem to gem.coop
        working-directory: release-gem
        env:
          GEM_NAME: ${{ steps.gem_name.outputs.gem_name }}
          GEM_HOST_API_KEY: ${{ secrets.GEM_COOP_API_KEY }}
        run: |
          case "$GEM_NAME" in
            dry-*)           NAMESPACE="@dry" ;;
            hanami|hanami-*) NAMESPACE="@hanami" ;;
            rom|rom-*)       NAMESPACE="@rom" ;;
            *)
              echo "WARNING: No gem.coop namespace found for '$GEM_NAME', skipping gem.coop publish"
              exit 0
              ;;
          esac
          gem push --host "https://beta.gem.coop/${NAMESPACE}" "${GEM_NAME}"-*.gem

      - name: Wait for RubyGems.org release
        working-directory: release-gem
        env:
          GEM_NAME: ${{ steps.gem_name.outputs.gem_name }}
        run: |
          gem install rubygems-await
          gem await "${GEM_NAME}"-*.gem

      - name: Publish GitHub release
        uses: ./.github/actions/publish-github-release
        with:
          target-path: release-gem
          repo: ${{ github.event.inputs.repo }}
          tag: ${{ github.event.inputs.tag }}
          github-token: ${{ secrets.CREATE_GITHUB_RELEASE_TOKEN }}

      - name: Annotate workflow
        working-directory: release-gem
        run: |
          TAG="${{ github.event.inputs.tag }}"
          TAGGER=$(git for-each-ref --format='%(taggername)' "refs/tags/$TAG")
          if [ -z "$TAGGER" ]; then
            TAGGER=$(git log -1 --pretty=format:'%an' "$TAG")
          fi
          echo "### Tag created by: $TAGGER" >> $GITHUB_STEP_SUMMARY

      - name: Update release history
        uses: ./.github/actions/update-release-history
        with:
          target-path: release-gem
          package-name: ${{ steps.gem_name.outputs.gem_name }}
          tag: ${{ github.event.inputs.tag }}
          github-token: ${{ github.token }}

      - name: Trigger announcements
        if: github.event.inputs.announce == 'true'
        uses: ./.github/actions/trigger-announcements
        with:
          repo: ${{ github.event.inputs.repo }}
          tag: ${{ github.event.inputs.tag }}
          package-name: ${{ steps.gem_name.outputs.gem_name }}
