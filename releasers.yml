# Authorized releasers
#
# This config maps package names to GitHub usernames of authorized releasers. Each releaser must
# have a corresponding key file in `releasers/`.

# Default releasers can release all packages.
default:
  - timriley
  - cllns
  - flash-gordon

# Package releasers can release specific packages.
#
# Entries here are added to the default releasers.
packages: {}
